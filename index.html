<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>If We Were Incredibly Talented</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Gaegu:wght@400;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="style.css">

</head>

<body>

    <!-- HOME -->

    <section id="home" class="screen active">

        <div class="corner tl">🌷</div>
        <div class="corner tr">🌿</div>
        <div class="corner bl">🍓</div>
        <div class="corner br">🩵</div>

        <div class="berry b1">🍓</div>
        <div class="berry b2">🍓</div>
        <div class="berry b3">🍓</div>

        <div class="sun"></div>

        <div class="cloud cloud1"></div>
        <div class="cloud cloud2"></div>

        <div class="bench"></div>

        <div class="plant p1">🌿</div>
        <div class="plant p2">🌷</div>
        <div class="plant p3">🌼</div>
        <div class="plant p4">🌿</div>

        <h1 id="title">
            If We Were Incredibly Talented...
        </h1>

        <button id="startBtn">
            ➜
        </button>

    </section>

    <!-- CARDS -->

    <section id="cards" class="screen">

        <div class="sticker s1">⭐</div>
        <div class="sticker s2">🩵</div>
        <div class="sticker s3">🥐</div>
        <div class="sticker s4">🍓</div>

        <div id="star">⭐</div>

        <div class="card sofia locked">

            <span class="lock">🔒</span>

            <h2>Sofia</h2>

        </div>

        <div class="card rachelCard locked">

            <span class="lock">🔒</span>

            <h2>Rachell</h2>

        </div>

    </section>

    <!-- SOFIA -->

    <section id="sofia" class="screen">

        <h1>🦆 Sofia's World 🦆</h1>

<div class="sofiaStickers">

⭐ 🎧 💿 🌠 💜 🎀 🍉 🌷

🍓 👽 ☁️ 🎨 💌 ✨ 🌙


</div>

        <div class="gallery">

            <div class="frame">
                <img src="practice.jpg">
            </div>

            <div class="frame">
                <img src="stage.jpg">
            </div>

            <div class="frame">
                <img src="trophy.jpg">
            </div>

        </div>

        <div class="backArrow">
            ⬇️
        </div>

    </section>
<!-- RACHEL -->

<section id="rachel" class="screen">

```
<h1>🍓 Rachel's World 🍓</h1>

<div class="rachelStickers">

    🎨 🖌️ 🍓 ✨ 🩷 🎀
    😽 📖 🌷 ⭐ 🧃
    🎨 🖼️ 🍓 ✨ 👻

</div>

<div class="gallery">

    <div class="frame">
        <img src="paint.jpg">
    </div>

    <div class="frame">
        <img src="exhibition.jpg">
    </div>

    <div class="frame">
        <img src="museum.jpg">
    </div>

</div>

<div class="endArrow">
    ⬇️
</div>
```

</section>

<!-- ENDING -->

<section id="ending" class="screen">

```
<h1>🌷 The End 🌷</h1>

<p>
    And just like your ex said...
</p>

<h2>
    We finished.
</h2>

<div class="finalEmoji">
    ⭐ 👽 🍓 🎀 ✨
</div>
```

</section>

<script src="script.js"></script>

</body>

</html>
